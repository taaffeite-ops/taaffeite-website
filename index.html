<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taaffeite Events | Luxury Event Planning & Design</title>
  <meta name="description"
    content="Taaffeite is a high-end luxury events planning agency specializing in elegant, warm, and minimal celebrations. Named after one of the rarest gemstones in the world." />
  <link rel="shortcut icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
  <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" as="style" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <!-- LCP image: preload with imagesizes so the browser can assign correct priority before layout -->
  <link
    rel="preload"
    as="image"
    href="/assets/05 PHOTOS/Proposal/0039.webp"
    fetchpriority="high"
    imagesizes="100vw"
  />
  <link rel="preload" as="image" href="/assets/images/logo.png" fetchpriority="high" />
  <style>
    /* Instant Loading Screen Styles */
    .global-loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: #fdfdfd;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999999;
      transition: transform 1.2s cubic-bezier(0.85, 0, 0.15, 1);
    }

    .loader-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }

    @keyframes logoFadeIn {
      from {
        opacity: 0;
        transform: scale(0.92);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .loader-logo {
      width: 300px;
      height: 225px;
      aspect-ratio: 4 / 3;
      object-fit: contain;
      opacity: 0;
      animation: logoFadeIn 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    @media (max-width: 768px) {
      .loader-logo {
        width: 180px;
        height: 135px;
      }
    }

    /* Content fade-out animations when finished */
    .global-loader.fade-out-content .loader-logo {
      opacity: 0;
      transform: scale(0.95);
    }

    /* Sliding panel animation */
    .global-loader.slide-up {
      transform: translateY(-100%);
    }
  </style>
</head>

<body>
  <!-- Global Loader -->
  <div id="global-loader" class="global-loader">
    <div class="loader-content">
      <img src="/assets/images/Untitled - 23 June 2026 at 00.03.06.gif" id="global-loader-logo" class="loader-logo"
        width="300" height="225" alt="Taaffeite Events Loading">
    </div>
  </div>
  <script>
    (function () {
      // Immediately lock page scrolling
      document.body.style.overflow = 'hidden';

      var loader = document.getElementById('global-loader');

      function dismissLoader() {
        setTimeout(function () {
          if (loader) {
            loader.classList.add('fade-out-content');
          }

          setTimeout(function () {
            if (loader) {
              loader.classList.add('slide-up');
            }
            document.body.style.overflow = '';

            // Clean up the DOM once the slide animation finishes
            setTimeout(function () {
              if (loader) loader.remove();
            }, 1200);
          }, 200);
        }, 200);
      }

      if (document.readyState === 'complete') {
        // Visual buffer of 600ms if page is already cached/complete
        setTimeout(dismissLoader, 600);
      } else {
        var startTime = Date.now();
        var dismissed = false;

        function tryDismiss() {
          // Guard against double-invocation if both react-ready and window.load fire
          if (dismissed) return;
          dismissed = true;
          var elapsed = Date.now() - startTime;
          var delay = Math.max(0, 600 - elapsed); // preserve 600ms min display time
          setTimeout(dismissLoader, delay);
        }

        // Primary trigger: React dispatches this after its first render commit,
        // meaning content is in the DOM well before images finish loading.
        document.addEventListener('react-ready', tryDismiss, { once: true });

        // Fallback: window.load — catches edge cases where react-ready never fires
        // (e.g. JS errors, very old browsers). No longer the primary path.
        window.addEventListener('load', tryDismiss, { once: true });

        // Safety valve: reduced from 5s to 3s
        setTimeout(dismissLoader, 3000);
      }
    })();
  </script>

  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
